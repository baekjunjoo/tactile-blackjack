name: Build to docs (branch Pages)

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Fetch 자산(이미지 + DotPad SDK)
        run: node scripts/fetch-assets.mjs || echo "asset fetch failed - runtime CDN fallback"
      - name: Test (비차단)
        run: npm test || echo "tests reported failures"
      - name: Build
        run: npx vite build
      - name: Publish to docs/
        run: |
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "build: publish to docs [skip ci]" || echo "no changes"
          git pull --rebase origin main || true
          git push
