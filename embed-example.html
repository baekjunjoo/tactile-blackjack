<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>촉각 블랙잭 — 임베드 예시</title>
  <style>
    body { margin: 0; font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #0d0d0f; color: #ececec; }
    header { padding: 12px 20px; border-bottom: 1px solid #2a2a31; display: flex; gap: 12px; align-items: center; }
    header .mark { width: 28px; height: 28px; border-radius: 6px; background: #ea5414; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    a.newtab { margin-left: auto; color: #ea5414; }
    .frame-wrap { height: calc(100vh - 53px); }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <header>
    <span class="mark" aria-hidden="true">&#9824;</span>
    <strong>촉각 블랙잭</strong>
    <!-- 스크린리더 사용자를 위해 전체 화면(새 탭) 링크도 함께 제공 권장 -->
    <a class="newtab" href="https://baekjunjoo.github.io/tactile-blackjack/" target="_blank" rel="noopener">전체 화면으로 열기</a>
  </header>
  <div class="frame-wrap">
    <!-- allow="bluetooth" 가 있어야 iframe 안에서 DotPad 연결이 됩니다.
         배포 URL(GitHub Pages 또는 자체 호스팅 경로)로 src를 바꾸세요. -->
    <iframe
      src="https://baekjunjoo.github.io/tactile-blackjack/"
      title="촉각 블랙잭 게임"
      allow="bluetooth; autoplay"
      allowfullscreen></iframe>
  </div>
</body>
</html>
